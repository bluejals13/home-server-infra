# 핵심 서비스
nginx:
  image: nginx:latest
  replicaCount: 1
  livenessPath: /
  readinessPath: /

frontend:
  image: my-frontend:latest
  replicaCount: 1
  livenessPath: /healthz
  readinessPath: /ready

backend:
  image: my-backend:latest
  replicaCount: 1
  livenessPath: /healthz
  readinessPath: /ready

redis:
  image: redis:latest
  replicaCount: 1

db:
  image: postgres:15
  storage: 1Gi
  replicaCount: 1

# 옵션: 모니터링 / 로깅
monitoring:
  enabled: false
  prometheus:
    image: prom/prometheus
    port: 9090

logging:
  enabled: false
  loki:
    image: grafana/loki
    port: 3100