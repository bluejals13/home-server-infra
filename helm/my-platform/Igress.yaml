apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-platform-ingress-ip
  namespace: default
spec:
  ingressClassName: traefik  # Traefik IngressClass 사용
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: my-platform
                port:
                  number: 80
